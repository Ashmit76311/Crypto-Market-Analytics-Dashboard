version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: crypto-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: crypto_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-ppass" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: python:3.11-slim
    container_name: crypto-api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "pip install -r requirements.txt -q &&
               uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: pass
      DB_NAME: crypto_db
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
